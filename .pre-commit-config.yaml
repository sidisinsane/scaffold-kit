# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General hooks for common issues.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      # - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict

  # Python linting and formatting using ruff.
  # Docs: https://docs.astral.sh/ruff/
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Static type checking using mypy.
  # TODO: Fix "There are no .py[i] files in ..."
  # Docs: https://mypy.readthedocs.io/en/stable/
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.17.0
  #   hooks:
  #     - id: mypy
  #       args: [--no-warn-no-context, --ignore-missing-imports]

  # Security checks using bandit.
  # Docs: https://bandit.readthedocs.io/en/latest/index.html
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-r, -c, bandit.yaml]

  # YAML linting using yamllint.
  # Docs: https://yamllint.readthedocs.io/en/stable/
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        args: [--strict, -c, .yamllint.yaml]

  # Markdown linting using markdownlint.
  # Docs: https://github.com/igorshubovych/markdownlint-cli
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        files: \.(md|markdown)$
        args: [--config, .markdownlint.yaml]
